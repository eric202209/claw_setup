# AI Gateway Global Configuration
server:
  port: 8000
  host: "0.0.0.0"

# Model routing rules
routing:
  default_model: "qwen-local"    # 127.0.0.1:8001
  external_fallback: "gemini-flash"

# Local Llama.cpp setup (Qwen 3.5-A3B)
# Define the URL makes it easier for the proxy to call
local_llama:
  url: "http://127.0.0.1:8001"
  model: "qwen-local"

# Host Ollama
ollama:
  base_url: "http://host.docker.internal:11434"
  model: "nomic-embed-text:latest"

# Gemini API
gemini:
  api_key: "your_gemini_api_key"
  model: "gemini-2.5-flash"

storage:
  upload_dir: "/root/.openclaw/workspace/vault/downloads"

logging:
  level: "INFO"
  path: "/opt/ai-gateway/logs/proxy.log"